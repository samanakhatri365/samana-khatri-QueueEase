services:
  - type: web
    name: queueease-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false   # Set manually in Render dashboard
      - key: CLIENT_URL
        sync: false   # Set manually to your Vercel URL after frontend deploy
      - key: SENDGRID_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
